<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            position: relative;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            padding: 4rem 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #a5b4fc 0%, #d8b4fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 3.5rem;
            font-size: 1.1rem;
        }

        .mic-outer {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 3rem;
        }

        .mic-btn {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #4f46e5 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border: none;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 40px var(--primary-glow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
            position: relative;
        }

        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px var(--primary-glow);
        }

        .mic-btn:active {
            transform: scale(0.95);
        }

        .pulse-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0;
            z-index: 1;
            pointer-events: none;
        }

        .recording .pulse-ring {
            animation: pulse-out 2s infinite;
        }

        @keyframes pulse-out {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            100% {
                transform: scale(2.2);
                opacity: 0;
            }
        }

        .recording .mic-btn {
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
            box-shadow: 0 10px 40px rgba(239, 68, 68, 0.4);
        }

        .status-badge {
            display: inline-block;
            padding: 0.5rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .recording .status-badge {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.2);
        }

        .chat-bubble {
            margin-top: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 1.5rem;
            text-align: left;
            border-left: 4px solid var(--primary);
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .text {
            line-height: 1.6;
            color: var(--text);
            font-size: 1.05rem;
        }

        .transcription {
            font-style: italic;
            color: var(--text-dim);
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .visualizer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 30px;
            margin-bottom: 1rem;
            opacity: 0;
        }

        .recording .visualizer {
            opacity: 1;
        }

        .bar {
            width: 4px;
            height: 8px;
            background: var(--danger);
            border-radius: 4px;
            animation: bounce 0.8s ease-in-out infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                height: 8px;
            }

            50% {
                height: 28px;
            }
        }

        .bar:nth-child(2) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(3) {
            animation-delay: 0.2s;
        }

        .bar:nth-child(4) {
            animation-delay: 0.3s;
        }

        .bar:nth-child(5) {
            animation-delay: 0.4s;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card" id="appCard">
            <div class="status-badge" id="statusBadge">Ready to Listen</div>
            <h1>Voice AI Assistant</h1>
            <p class="subtitle">Ask for weather, search, or research</p>

            <div class="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <div class="mic-outer">
                <div class="pulse-ring"></div>
                <button class="mic-btn" id="micBtn">🎙️</button>
            </div>

            <div class="chat-bubble" id="responseBubble">
                <div class="label">You said:</div>
                <div class="transcription" id="transcription">...</div>
                <div class="label">Assistant:</div>
                <div class="text" id="responseText">...</div>
            </div>
        </div>
    </div>

    <script>
        const appCard = document.getElementById('appCard');
        const micBtn = document.getElementById('micBtn');
        const statusBadge = document.getElementById('statusBadge');
        const responseBubble = document.getElementById('responseBubble');
        const transcription = document.getElementById('transcription');
        const responseText = document.getElementById('responseText');

        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let mimeType = 'audio/webm'; // default; updated on MediaRecorder init

        micBtn.addEventListener('click', () => {
            if (!isRecording) startRecording();
            else stopRecording();
        });

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // Pick the best supported MIME type for Whisper
                const preferred = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/ogg', 'audio/mp4'];
                mimeType = preferred.find(t => MediaRecorder.isTypeSupported(t)) || '';

                mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = processAudio;

                mediaRecorder.start();
                isRecording = true;
                appCard.classList.add('recording');
                statusBadge.innerText = "Listening...";
                responseBubble.style.display = 'none';
            } catch (err) {
                statusBadge.innerText = "Error: Microphone access denied";
                console.error('Mic access error:', err);
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            isRecording = false;
            appCard.classList.remove('recording');
            statusBadge.innerText = "Thinking...";
        }

        async function processAudio() {
            // Use the actual MIME type so Whisper knows what format it's receiving
            const ext = mimeType.includes('ogg') ? 'ogg' : mimeType.includes('mp4') ? 'mp4' : 'webm';
            const audioBlob = new Blob(audioChunks, { type: mimeType || 'audio/webm' });
            const formData = new FormData();
            formData.append('data', audioBlob, `recording.${ext}`);

            // Send browser language for multilingual support
            const lang = navigator.language ? navigator.language.split('-')[0] : 'en';
            formData.append('language', lang);

            try {
                // n8n Webhook URL — use webhook-test while testing in n8n, switch to /webhook/ for production
                // IMPORTANT: Replace with your actual n8n Webhook URL
                const N8N_URL = 'http://localhost:5678/webhook-test/voice-agent';

                const response = await fetch(N8N_URL, {
                    method: 'POST',
                    body: formData
                });

                console.log("n8n Response Status:", response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error("n8n Error Body:", errorText);
                    statusBadge.innerText = `Error ${response.status}: ${errorText.slice(0, 60)}`;
                    return;
                }

                const data = await response.json();
                console.log("n8n Response Data:", data);

                statusBadge.innerText = "Ready";
                responseBubble.style.display = 'block';

                // Handle error responses from the recovery node
                if (data.error) {
                    responseBubble.style.borderLeftColor = 'var(--danger)';
                    transcription.innerText = data.transcribed_text || '(voice input)';
                    responseText.innerText = data.response || 'An error occurred.';
                    statusBadge.innerText = 'Error — try again';
                } else {
                    responseBubble.style.borderLeftColor = 'var(--primary)';
                    transcription.innerText = data.transcribed_text || "(voice input)";
                    responseText.innerText = data.response || "No response received";

                    // TTS — speak the assistant reply aloud
                    if (data.response) {
                        const speech = new SpeechSynthesisUtterance(data.response);
                        speech.pitch = 1.1;
                        speech.rate = 1.0;
                        window.speechSynthesis.speak(speech);
                    }
                }

            } catch (err) {
                statusBadge.innerText = "Failed to reach n8n";
                console.error('Fetch error:', err);
            }
        }
    </script>
</body>

</html>
